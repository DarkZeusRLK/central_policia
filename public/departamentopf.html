<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PF | Central de Polícia</title>
  <link rel="shortcut icon" href="../public/images/Logo_policia.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.22);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #fbbf24;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Inter, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(251, 191, 36, 0.12), transparent 35%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 30%),
        linear-gradient(180deg, #020617 0%, #0b1220 100%);
    }

    .notice-card {
      width: min(680px, 100%);
      padding: 40px 36px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    .logo {
      width: 78px;
      height: 78px;
      object-fit: contain;
      margin-bottom: 18px;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(251, 191, 36, 0.12);
      color: var(--accent);
      font-size: 1.9rem;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .timer {
      margin-top: 24px;
      font-size: 1.05rem;
      color: var(--text);
    }

    .timer strong {
      color: var(--accent);
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid rgba(251, 191, 36, 0.28);
      background: rgba(251, 191, 36, 0.12);
      color: #f8fafc;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: rgba(251, 191, 36, 0.18);
    }
  </style>
</head>

<body>
  <main class="notice-card">
    <img src="../public/images/Logo_policia.png" alt="Logo Polícia" class="logo">
    <div class="icon">
      <i class="fa-solid fa-circle-exclamation"></i>
    </div>
    <h1>Departamento Federal Desativado</h1>
    <p>
      No momento, a página da Polícia Federal está desativada e indisponível para acesso.
      Vocę será redirecionado automaticamente para a página inicial da Central de Polícia.
    </p>
    <p class="timer">
      Redirecionando em <strong id="countdown">10</strong> segundos...
    </p>
    <div class="actions">
      <a href="../index.html" class="button">
        <i class="fa-solid fa-house"></i>
        Ir agora para a página inicial
      </a>
    </div>
  </main>

  <script>
    let remainingSeconds = 10;
    const countdown = document.getElementById("countdown");

    const intervalId = window.setInterval(() => {
      remainingSeconds -= 1;
      countdown.textContent = String(remainingSeconds);

      if (remainingSeconds <= 0) {
        window.clearInterval(intervalId);
        window.location.href = "../index.html";
      }
    }, 1000);
  </script>
</body>

</html>
